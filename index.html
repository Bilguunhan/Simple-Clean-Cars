<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <title>Simple Clean Cars</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cars.css">
</head>

<body>

  <header>
    <h1>Clean Cars</h1>
  </header>

  <section class="hero">
    <div class="video-bg">
      <video id="hero-video" autoplay muted playsinline preload="auto">
        <source src="cars.mp4" type="video/mp4">
      </video>
    </div>

    <div class="overlay"></div>

    <div class="hero-nazev reveal">
      <h1>S.C.C.</h1>
      <h2>Simple Clean Cars</h2>
      <p>Created by HS student</p>
    </div>
  </section>

  <section id="gallery" class="section">
    <h2 class="title reveal">Car Types</h2>

    <div class="grid">

      <button class="car-card reveal">
        <img
          src="https://static1.hotcarsimages.com/wordpress/wp-content/uploads/2022/12/koenigsegg-jesko-absolut-header-v3-5.jpg">
        <h3>Hypercar</h3>
        <p>Vrchol kinematografie aut.</p>
      </button>

      <button class="car-card reveal">
        <img src="https://www.popsci.com/wp-content/uploads/2023/03/31/639366.jpg?quality=85">
        <h3>Supersport</h3>
        <p>Sportovní vůz na tratě.</p>
      </button>

      <button class="car-card reveal">
        <img
          src="https://www.topgear.com/sites/default/files/2023/09/33156-RS7PERFORMANCEASCARIBLUEJORDANBUTTERS132.jpg">
        <h3>Sedan</h3>
        <p>Maximální komfort a technologie.</p>
      </button>

      <button class="car-card reveal">
        <img src="https://tse3.mm.bing.net/th/id/OIP.ryl4M18lPBWL5Qz8kgj4XQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3">
        <h3>Coupe</h3>
        <p>Poměr, cena, výkon.</p>
      </button>

      <button class="car-card reveal">
        <img src="https://rare-gallery.com/uploads/posts/101542-land-rover-range-rover-sv-coupe-2019-cars-suv-4k.jpg">
        <h3>SUV</h3>
        <p></p>
      </button>

      <button class="car-card reveal">
        <img src="https://4kwallpapers.com/images/wallpapers/toyota-tacoma-trd-2880x1800-11567.jpgv">
        <h3>Pickup</h3>
        <p></p>
      </button>

      <button class="car-card reveal">
        <img src="">
        <h3>Hatchback</h3>
        <p></p>
      </button>

    </div>
  </section>

  <script src="cars.js"></script>
</body>

</html>
